    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SITE_PHASE
    value: beta
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ALLOW_INDEXING
