# Firebase App Hosting configuration for the CGE website.
#
# Keep private secrets out of this file. Store server-only values like
# SUPABASE_SERVICE_ROLE_KEY, PAYSTACK_SECRET_KEY, TERMII_API_KEY, and
# GIVEAWAY_ADMIN_SECRET in Firebase App Hosting environment settings or
# Google Cloud Secret Manager.

env:
